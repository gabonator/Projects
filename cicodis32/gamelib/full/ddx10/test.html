<script>
function base64ToUint8(base64) {
  const binary = atob(base64);
  const len = binary.length;
  const bytes = new Uint8Array(len);

  for (let i = 0; i < len; i++)
    bytes[i] = binary.charCodeAt(i);

  return bytes;
}
function deserialize(json) {
  const parsed = json;
  const out = {};
  for (const k in parsed) {
    out[k] = base64ToUint8(parsed[k]);
  }
  return out;
}
archive = deserialize(archive)

<script>
function audioMasterHandler() {
  const opcode = stack32(2);
  console.log("audio master ", opcode)
  r32[eax] = 0;
}

const vstEventsPtr = allocate(8 + 32 * 4);
const vstEventsDataPtr = allocate(32 * 32);

function processEvents(pluginPtr, dispatcherPtr, events) {
  if (!events || !events.length)
    return;
  //console.log(events);

  const numEvents = events.length;

  const ptrs = events.map((ev, i) => {
    const p = vstEventsDataPtr + i *32; //allocate(32);
    memoryASet32(ds, p + 0x00, 1);   // type = kVstMidiType
    memoryASet32(ds, p + 0x04, 32);  // byteSize
    memoryASet32(ds, p + 0x08, ev.deltaFrames || 0);
    memoryASet32(ds, p + 0x0c, 0);   // flags
    memoryASet32(ds, p + 0x10, 0);   // noteLength
    memoryASet32(ds, p + 0x14, 0);   // noteOffset
    // midiData[0..3] packed as little-endian uint32
    memoryASet32(ds, p + 0x18,
      (ev.status & 0xff) | ((ev.note & 0xff) << 8) | ((ev.velocity & 0xff) << 16));
    memoryASet32(ds, p + 0x1c, 0);
    return p;
  });

  memoryASet32(ds, vstEventsPtr + 0, numEvents);
  memoryASet32(ds, vstEventsPtr + 4, 0);
  ptrs.forEach((p, i) => memoryASet32(ds, vstEventsPtr + 8 + i * 4, p));

  // effProcessEvents = opcode 25
  push32(0); push32(vstEventsPtr); push32(0); push32(0); push32(25); push32(pluginPtr);
  indirectCall(cs, dispatcherPtr);
  r32[esp] += 24;
}

  init();

  const BLOCK_SIZE    = 1024*2;
  const SAMPLE_RATE   = 44100;

  const audioMasterPtr  = 0x77778888;
  const pluginStructPtr = allocate(0x1080);

  push32(audioMasterPtr);
  push32(pluginStructPtr);
  sub_10008b40();
  r32[esp] += 8;

  let pluginPtr = r32[eax] + 0x20;
  console.log('AEffect @ 0x' + pluginPtr.toString(16));

  const dispatcherPtr = memoryAGet32(ds, pluginPtr + 0x04);
  const thisPtr       = memoryAGet32(ds, pluginPtr + 0x40);
  const setParamFnPtr = memoryAGet32(ds, pluginPtr + 0x0c); // AEffect.setParameter = 0x10010700
  console.log('C++ object @ 0x' + thisPtr.toString(16));


  // effSetProgram (opcode 2) — select preset index (0–31, see CLAUDE.md for full list)
  const PRESET_INDEX = 1; // 0 = Bright E.Piano
 // patch 8, 16 - infinite loop
  push32(0); push32(0); push32(PRESET_INDEX); push32(0); push32(2); push32(pluginPtr);
  indirectCall(cs, dispatcherPtr); r32[esp] += 24;
  console.log('Program set to preset', PRESET_INDEX);

  const outL       = allocate(BLOCK_SIZE * 4);
  const outR       = allocate(BLOCK_SIZE * 4);
  const inputPtrs  = allocate(4);
  const outputPtrs = allocate(8);
  memoryASet32(ds, outputPtrs + 0, outL);
  memoryASet32(ds, outputPtrs + 4, outR);
  let midiEvents = []

  function loop()
  {
    processEvents(pluginPtr, dispatcherPtr, midiEvents);
    midiEvents = [];

    // processReplacing
    push32(BLOCK_SIZE);
    push32(outputPtrs);
    push32(inputPtrs);
    push32(pluginPtr);
    sub_10010750();
    r32[esp] += 16;

    //
    const buffer = audioContext.createBuffer(2, BLOCK_SIZE, SAMPLE_RATE);
    const left = buffer.getChannelData(0);
    const right = buffer.getChannelData(1);

    for (let i = 0; i < BLOCK_SIZE; i++) {
        left[i] = FromFp32(memoryAGet32(ds, outL + i * 4));
        right[i] = FromFp32(memoryAGet32(ds, outR + i * 4));
    }

    return buffer;
  }


let audioContext;
let nextTime = 0;

function scheduleBuffer() {
    const buffer = loop();
    const source = audioContext.createBufferSource();
    source.buffer = buffer;
    source.connect(audioContext.destination);
    source.start(nextTime);
    nextTime += BLOCK_SIZE / SAMPLE_RATE;
}

async function playStart() {
    audioContext = new AudioContext({ SAMPLE_RATE });
    await audioContext.resume();

    nextTime = audioContext.currentTime;
    // schedule 3 buffers ahead to avoid gaps
    schedulerInterval = setInterval(() => {
      while (nextTime < audioContext.currentTime + 0.1) {
        scheduleBuffer();
      }
    }, 10); // run every 10 ms
}

// Map QWERTY keys to MIDI notes (C4=60, D4=62, etc.)
const keyMap = {
  'A': 60, // C
  'W': 61, // C#
  'S': 62, // D
  'E': 63, // D#
  'D': 64, // E
  'F': 65, // F
  'T': 66, // F#
  'G': 67, // G
  'Y': 68, // G#
  'H': 69, // A
  'U': 70, // A#
  'J': 71, // B
  'K': 72  // C5
};

let activeKeys = {}; // Track which keys are currently down
let first = true;

document.onkeydown = evt => handleKey(evt.key.toUpperCase(), 1);
document.onkeyup = evt => handleKey(evt.key.toUpperCase(), 0);

async function handleKey(key, pressed) {
  if (first) {
    first = false;
    playStart();
  }

  const midiNote = keyMap[key];
  if (!midiNote) return; // Ignore keys not mapped

  // Prevent repeat firing if key is already pressed
  if (activeKeys[key] === pressed) return;
  activeKeys[key] = pressed;

  if (pressed) {
    midiEvents.push({ status: 0x90, note: midiNote, velocity: 100 }); // Note on
  } else {
    midiEvents.push({ status: 0x80, note: midiNote, velocity: 0 });   // Note off
  }
}

// gui

//sub_10001b10();

// gui: call editor->open(hwnd) via effEditOpen vtable[3] = sub_10001b10
// ecx = editor object (at thisPtr+8), push hwnd=0 as the host window arg
const editorPtr = memoryAGet32(ds, thisPtr + 8);
r32[ecx] = editorPtr;
push32(0); // hwnd (stub, no real window)
sub_10001b10();
// sub_10001b10 is __thiscall+1 arg, pops its own arg (stackDrop4)

// ============ HTML GUI ============
const guiContainer = document.createElement('div');
guiContainer.style.cssText = 'position:relative;width:856px;height:392px;overflow:hidden;user-select:none';
document.body.appendChild(guiContainer);

const VTABLE_NAME = {
  0x1003f864: 'TooltipKnob',
  0x1003fb5c: 'TooltipDisplay',
  0x10040c74: 'CSplashScreen',
  0x1003e89c: 'TextLabel',
  0x1003ea0c: 'TextEdit',
  0x1003eb8c: 'OptionMenu',
  0x1003f9f4: 'TooltipSlider',
  0x10040084: 'CParamDisplay',
  0x1003ff24: 'CControl',
  0x10040b2c: 'CKickButton',
};

function getPresetBase() {
  const pb = memoryAGet32(ds, thisPtr + 0xb0);
  const cp = memoryAGet32(ds, thisPtr + 0x1c);
  return pb + 0x60 * cp;
}

// VST param indices for the 5 knobs (left-to-right order)
const KNOB_PARAMS = [0, 1, 14, 15, 16];

// Call AEffect.setParameter(pluginPtr, paramIdx, float) via the plugin's own dispatch.
// This writes to the preset and triggers sub_1000aee0 (DSP recompute).
function callSetParam(paramIdx, newVal) {
  push32(toFp32(newVal)); // [esp+8] = float bits
  push32(paramIdx);       // [esp+4] = param index
  push32(pluginPtr);      // [esp+0] = AEffect*
  indirectCall(cs, setParamFnPtr);
  r32[esp] += 12;         // cdecl caller cleanup
}

function doSetProgram(idx) {
  idx = Math.max(0, Math.min(98, idx));
  push32(0); push32(0); push32(idx); push32(0); push32(2); push32(pluginPtr);
  indirectCall(cs, dispatcherPtr); r32[esp] += 24;
  buildGui();
}

function buildGui() {
  guiContainer.innerHTML = '';

  // Background
  const bg = document.createElement('img');
  bg.src = 'res/BACKGROUND.png';
  bg.style.cssText = 'position:absolute;left:0;top:0;width:856px;height:392px;pointer-events:none';
  guiContainer.appendChild(bg);

  const framePtr = memoryAGet32(ds, editorPtr + 0x10);
  const childCount = memoryAGet32(ds, framePtr + 0x100);
  const presetBase = getPresetBase();
  const presetName = readstring(presetBase + 0x44);

  // Preset name display (centered above sliders area)
  const nameDiv = document.createElement('div');
  nameDiv.style.cssText = 'position:absolute;left:316px;top:90px;width:172px;height:16px;background:#fff;border:1px solid #888;font-family:monospace;font-size:9px;line-height:16px;text-align:center;overflow:hidden;pointer-events:none';
  nameDiv.textContent = presetName;
  guiContainer.appendChild(nameDiv);

  let sliderIdx = 0, knobIdx = 0;

  for (let i = 0; i < childCount; i++) {
    const ptr  = memoryAGet32(ds, framePtr + 0x104 + i * 4);
    const vtbl = memoryAGet32(ds, ptr);
    const left = memoryAGet32(ds, ptr + 0x08);
    const top  = memoryAGet32(ds, ptr + 0x0c);
    const right  = memoryAGet32(ds, ptr + 0x10);
    const bottom = memoryAGet32(ds, ptr + 0x14);
    const tag  = memoryAGet32(ds, ptr + 0x48);
    const ww = right - left, hh = bottom - top;
    const type = VTABLE_NAME[vtbl];

    if (type === 'TooltipSlider') {
      const si = sliderIdx++;
      const val = Math.max(0, Math.min(1, FromFp32(memoryAGet32(ds, presetBase + si * 4))));

      const div = document.createElement('div');
      div.style.cssText = `position:absolute;left:${left}px;top:${top}px;width:${ww}px;height:${hh}px;cursor:ns-resize`;

      const back = document.createElement('img');
      back.src = 'res/SLIDERBACK.png';
      back.style.cssText = `position:absolute;left:0;top:0;width:${ww}px;height:${hh}px;pointer-events:none`;
      div.appendChild(back);

      const handleY = Math.round((1 - val) * 112);
      const handle = document.createElement('img');
      handle.src = 'res/SLIDERHANDLE.png';
      handle.style.cssText = `position:absolute;left:0;top:${handleY}px;width:${ww}px;height:16px;pointer-events:none`;
      div.appendChild(handle);

      div.addEventListener('mousedown', e => {
        const startY = e.clientY;
        const startVal = Math.max(0, Math.min(1, FromFp32(memoryAGet32(ds, presetBase + si * 4))));
        const onMove = me => {
          const dy = me.clientY - startY;
          const newVal = Math.max(0, Math.min(1, startVal - dy / 112));
          callSetParam(si + 2, newVal); // slider si → VST param (si+2)
          handle.style.top = Math.round((1 - newVal) * 112) + 'px';
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        e.preventDefault();
      });
      guiContainer.appendChild(div);

    } else if (type === 'TooltipKnob') {
      const ki = knobIdx++;
      const val = Math.max(0, Math.min(1, FromFp32(memoryAGet32(ds, presetBase + (12 + ki) * 4))));
      const SPRITE_H = 64;
      const frameIndex = Math.round(val * 100);

      const div = document.createElement('div');
      div.style.cssText = `position:absolute;left:${left}px;top:${top}px;width:${ww}px;height:${hh}px;overflow:hidden;cursor:ns-resize`;

      const img = document.createElement('img');
      img.src = 'res/KNOB.png';
      img.style.cssText = `position:absolute;left:0;top:-${frameIndex * SPRITE_H}px;width:${ww}px;height:6464px;pointer-events:none`;
      div.appendChild(img);

      div.addEventListener('mousedown', e => {
        const startY = e.clientY;
        const startVal = Math.max(0, Math.min(1, FromFp32(memoryAGet32(ds, presetBase + (12 + ki) * 4))));
        const onMove = me => {
          const dy = me.clientY - startY;
          const newVal = Math.max(0, Math.min(1, startVal - dy / 100));
          callSetParam(KNOB_PARAMS[ki], newVal); // knob ki → VST param KNOB_PARAMS[ki]
          img.style.top = `-${Math.round(newVal * 100) * SPRITE_H}px`;
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        e.preventDefault();
      });
      guiContainer.appendChild(div);

    } else if (type === 'CKickButton') {
      const isPrev = (tag === 0x68);
      const div = document.createElement('div');
      div.style.cssText = `position:absolute;left:${left}px;top:${top}px;width:${ww}px;height:${hh}px;cursor:pointer`;

      const img = document.createElement('img');
      img.src = isPrev ? 'res/PREV.png' : 'res/NEXT.png';
      img.style.cssText = `position:absolute;left:0;top:0;width:${ww}px;height:${hh}px;pointer-events:none`;
      div.appendChild(img);

      div.addEventListener('mousedown', e => {
        const prog = memoryAGet32(ds, thisPtr + 0x1c);
        doSetProgram(isPrev ? prog - 1 : prog + 1);
        e.preventDefault();
      });
      guiContainer.appendChild(div);

    } else if (type === 'CSplashScreen') {
      const img = document.createElement('img');
      img.src = 'res/SPLASHSCREEN.png';
      img.style.cssText = `position:absolute;left:${left}px;top:${top}px;width:${ww}px;height:${hh}px;pointer-events:none`;
      //guiContainer.appendChild(img);
    }
  }
}

buildGui();
</script>
